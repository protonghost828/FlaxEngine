name: Build Flax Engine Editor (Windows)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-editor:
    name: Windows Editor Build
    runs-on: windows-2022
    steps:
      # ——————————————————————————————————————
      # Checkout official Flax Engine source
      - name: Checkout Official Flax Engine
        uses: actions/checkout@v4
        with:
          repository: FlaxEngine/FlaxEngine
          ref: master
          lfs: true
          submodules: recursive

      # ——————————————————————————————————————
      # Install .NET + Vulkan dependencies
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Print .NET info
        run: |
          dotnet --info
          dotnet workload --info

      - name: Setup Vulkan
        uses: ./.github/actions/vulkan

      # ——————————————————————————————————————
      # Build Editor
      - name: Build Windows Editor
        run: |
          .\Development\Scripts\Windows\CallBuildTool.bat ^
            -build -log -printSDKs -dotnet=8 ^
            -arch=x64 -platform=Windows ^
            -configuration=Development ^
            -buildtargets=FlaxEditor

      # ——————————————————————————————————————
      # Package Editor
      - name: Package Editor Build
        run: |
          powershell Compress-Archive -Path ".\Build\Windows\x64\FlaxEditor\*" `
            -DestinationPath ".\FlaxEditor-Full.zip" -Force

      # ——————————————————————————————————————
      # Upload ZIP artifact
      - name: Upload Editor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlaxEditor-Windows-Full
          path: .\FlaxEditor-Full.zip
